.cad-hist-ic.t-achievement{background:rgba(224,160,62,.16);color:#E0A03E}
.cad-hist-ic.t-buy{background:rgba(184,111,224,.16);color:#B86FE0}
.cad-hist-txt{flex:1;font-size:13px;color:var(--ink);min-width:0}
.cad-hist-side{display:flex;align-items:center;gap:8px;flex-shrink:0}
.cad-hist-xp{font-style:normal;font-size:11px;font-weight:700;color:#7FD0B8}
.cad-hist-coin{font-style:normal;font-size:11px;font-weight:700;color:#E0A03E;display:flex;align-items:center;gap:2px}
.cad-hist-coin.neg{color:var(--muted)}
.cad-hist-time{font-style:normal;font-size:10px;color:var(--muted);min-width:54px;text-align:right}

/* bouton réglages -> gamification */
.cad-cfg-open{display:flex;align-items:center;gap:12px;width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--field);cursor:pointer;text-align:left;color:var(--ink)}
.cad-cfg-open:hover{border-color:var(--brand)}
.cad-cfg-open-ic{width:34px;height:34px;border-radius:9px;background:var(--brand-soft,rgba(84,167,147,.14));color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cad-cfg-open-tx{flex:1;display:flex;flex-direction:column;gap:1px}
.cad-cfg-open-tx strong{font-size:13px}
.cad-cfg-open-tx small{font-size:11px;color:var(--muted)}
.cad-cfg-open>svg{color:var(--muted)}

/* menu de config gamification */
.cad-cfg-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.cad-num{width:88px;text-align:center}
.cad-cfg-rewards{display:flex;flex-direction:column;gap:8px}
.cad-cfg-reward{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cad-cfg-rar{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;min-width:120px}
.cad-cfg-reward label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.cad-cfg-shop{display:flex;flex-direction:column;gap:10px}
.cad-cfg-item{border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--field);display:flex;flex-direction:column;gap:8px}
.cad-cfg-item-top{display:flex;gap:8px;align-items:center}
.cad-cfg-item-top .cad-in{flex:1}
.cad-cfg-item-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cad-sel{width:auto;padding-right:8px}
.cad-color{width:46px;height:38px;padding:3px;cursor:pointer}
.cad-cfg-price{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-left:auto}
.cad-del-x{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0}
.cad-del-x:hover{color:#E0654E;background:var(--bg)}
.cad-add-item{justify-content:center}
.cad-brand h1{font-family:'Fraunces',serif;font-size:25px;font-weight:600;letter-spacing:-.01em;line-height:1.05;color:#EDEFEA;cursor:text;display:inline-block;padding:1px 6px;margin-left:-6px;border-radius:7px;transition:background .12s}
.cad-brand h1:hover{background:var(--field)}
.cad-name-edit{font-family:'Fraunces',serif;font-size:23px;font-weight:600;color:var(--ink);background:var(--field);border:1px solid var(--brand);border-radius:8px;padding:2px 8px;outline:none;width:min(280px,62vw)}
.cad-head-r{display:flex;align-items:center;gap:10px}
.cad-theme-btn{width:38px;height:38px;flex-shrink:0;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cad-theme-btn:hover{color:var(--ink);border-color:var(--line-strong)}
.cad-brand p{font-size:13px;color:var(--muted);margin-top:4px}
.cad-od{color:#E8836B;font-weight:600}
.cad-seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px}
.cad-seg button{display:flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;padding:8px 13px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--muted);font-family:inherit;transition:all .15s}
.cad-seg button.on{background:var(--brand);color:#10201B}
.cad-seg button:not(.on):hover{color:var(--ink)}

.cad-qadd{display:flex;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:8px;margin-bottom:16px;flex-wrap:wrap}
.cad-qtitle{flex:1 1 200px;border:none;background:none;font-size:15px;font-family:inherit;color:var(--ink);padding:8px 10px;outline:none}
.cad-qtitle::placeholder{color:#5E635C}
.cad-qdate,.cad-qprio{border:1px solid var(--line);background:var(--field);border-radius:9px;padding:8px 10px;font-size:13px;font-family:inherit;color:var(--muted);cursor:pointer;outline:none}
.cad-qprio{font-weight:600}
.cad-qbtn{width:40px;height:40px;border:none;border-radius:9px;background:var(--brand);color:#10201B;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s,opacity .15s}
.cad-qbtn:hover:not(:disabled){transform:scale(1.05)}
.cad-qbtn:disabled{opacity:.4;cursor:not-allowed}

.cad-controls{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cad-filters{display:flex;gap:8px}
.cad-filters button{border:1px solid var(--line);background:var(--surface);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
.cad-filters button span{font-size:11px;background:var(--field);padding:1px 7px;border-radius:10px}
.cad-filters button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.cad-filters button.on span{background:rgba(0,0,0,.18)}

.cad-sort{position:relative}
.cad-sort-btn{display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.cad-sort-btn:hover{border-color:#3A4248}
.cad-sort-btn svg:last-child{color:var(--muted)}
.cad-sort-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:30;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:6px;min-width:212px;box-shadow:0 16px 40px rgba(0,0,0,.5);animation:cadPop .15s ease}
.cad-sort-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:6px 10px 4px}
.cad-sort-menu button{display:flex;align-items:center;gap:9px;width:100%;border:none;background:none;color:var(--ink);font-family:inherit;font-size:13.5px;font-weight:500;padding:9px 10px;border-radius:8px;cursor:pointer;text-align:left;transition:background .12s}
.cad-sort-menu button:hover{background:var(--field)}
.cad-sort-menu button.on{color:var(--brand);font-weight:600}
.cad-sort-menu button svg:first-child{color:var(--muted);flex-shrink:0}
.cad-sort-menu button.on svg:first-child{color:var(--brand)}
.cad-sort-chk{margin-left:auto}
.cad-drag-hint{font-size:12px;color:var(--muted);margin:0 2px 10px;display:flex;align-items:center;gap:6px}

.cad-sect{margin-top:18px}
.cad-sect-h{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-left:2px}
.cad-sect-h span{margin-left:auto;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:1px 8px;border-radius:10px;font-size:11px;letter-spacing:0}

.cad-row{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:7px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.cad-row:hover{border-color:#3A4248;box-shadow:0 2px 12px rgba(0,0,0,.28)}
.cad-row.done{opacity:.5}
.cad-row.dragging{opacity:.45;border-color:var(--brand);box-shadow:0 10px 28px rgba(0,0,0,.45)}
.cad-row-banner{display:block;width:100%;height:118px;padding:0;border:none;border-bottom:1px solid var(--line);background:var(--field);cursor:pointer;overflow:hidden}
.cad-row-banner img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s}
.cad-row:hover .cad-row-banner img{transform:scale(1.03)}
.cad-row-main{display:flex;align-items:flex-start;gap:12px;padding:13px 14px}
.cad-grip{display:flex;align-items:center;color:#565C55;cursor:grab;margin-top:1px;flex-shrink:0}
.cad-grip:active{cursor:grabbing}
.cad-row-body{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.cad-row-open{border:none;background:none;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:4px;font-family:inherit;padding:0;width:100%;min-width:0}
.cad-row-title{font-size:15px;font-weight:500;color:var(--ink);line-height:1.35}
.cad-row.done .cad-row-title{text-decoration:line-through;color:var(--muted)}
.cad-row-desc{font-size:13px;color:var(--muted);line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cad-row-checks{display:flex;flex-direction:column;gap:2px}
.cad-rc{display:flex;align-items:flex-start;gap:8px;border:none;background:none;cursor:pointer;font-family:inherit;text-align:left;padding:2px 6px 2px 0;border-radius:6px;transition:background .12s}
.cad-rc:hover{background:var(--field)}
.cad-rc-box{flex-shrink:0;width:16px;height:16px;margin-top:1px;border:2px solid var(--muted);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cad-rc:hover .cad-rc-box{border-color:var(--brand)}
.cad-rc.on .cad-rc-box{background:var(--brand);border-color:var(--brand)}
.cad-rc-text{font-size:13px;line-height:1.4;color:#C9CCC6;word-break:break-word}
.cad-rc.on .cad-rc-text{text-decoration:line-through;color:var(--muted)}
.cad-rc-text b,.cad-rc-text strong{font-weight:700;color:var(--ink)}
.cad-rc-text i,.cad-rc-text em{font-style:italic}
.cad-rc-more{align-self:flex-start;border:none;background:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);padding:2px 4px;border-radius:6px;transition:color .12s}
.cad-rc-more:hover{color:var(--brand)}
.cad-row-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:1px}
.cad-prio{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:6px}
.cad-status{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:6px}
.cad-sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.cad-sicon{font-size:12px;line-height:1;display:inline-flex;flex-shrink:0}
.cad-ticon{margin-right:6px}

/* Case « terminé » unifiée (toutes les vues) */
.cad-done{flex-shrink:0;width:24px;height:24px;margin-top:1px;border-radius:50%;border:2px solid var(--muted);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.cad-done svg{opacity:0;color:var(--muted);transition:opacity .12s}
.cad-done:hover{border-color:var(--brand);transform:scale(1.08)}
.cad-done:hover svg{opacity:.55;color:var(--brand)}
.cad-done.on{background:var(--brand);border-color:var(--brand)}
.cad-done.on svg{opacity:1;color:#10201B}

/* Champ titre avec icône */
.cad-title-row{display:flex;gap:8px;align-items:stretch}
.cad-icon-field{position:relative;flex-shrink:0}
.cad-icon-btn{height:100%;min-width:48px;border:1px solid var(--line);background:var(--field);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.cad-icon-btn:hover{border-color:var(--brand);color:var(--brand)}
.cad-icon-cur{font-size:20px;line-height:1}

/* Sélecteur d'emoji */
.cad-emoji-pop{position:absolute;top:30px;left:0;z-index:30;display:grid;grid-template-columns:repeat(6,1fr);gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px;width:204px;max-height:150px;overflow-y:auto;box-shadow:0 16px 40px rgba(0,0,0,.5);animation:cadPop .14s ease}
.cad-emoji-pop button{width:30px;height:30px;border:none;background:none;cursor:pointer;border-radius:7px;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .12s}
.cad-emoji-pop button:hover{background:var(--field)}
.cad-emoji-pop button.on{background:var(--brand-soft);outline:1px solid var(--brand)}
.cad-emoji-none{color:var(--muted)}
.cad-emoji-none:hover{color:var(--ink)}

/* Icône de catégorie (kanban) */
.cad-kgear{flex-shrink:0;border:none;background:none;cursor:pointer;color:var(--muted);padding:3px;border-radius:6px;display:flex;align-items:center;transition:all .12s}
.cad-kgear:hover{color:var(--ink);background:var(--field)}
.cad-kdot-static{flex-shrink:0;width:11px;height:11px;border-radius:50%}
.cad-kcol-emoji{flex-shrink:0;font-size:15px;line-height:1}

/* Modals catégorie & paramètres */
.cad-modal-sm{max-width:390px}
.cad-emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px}
.cad-emoji-grid button{width:100%;aspect-ratio:1/1;border:none;background:var(--field);cursor:pointer;border-radius:7px;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--muted)}
.cad-emoji-grid button:hover{background:var(--line)}
.cad-emoji-grid button.on{outline:2px solid var(--brand);outline-offset:-2px;background:var(--brand-soft)}
.cad-swatch-row{display:flex;gap:6px;flex-wrap:wrap}
.cad-swatch-row button{width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,.14);cursor:pointer;padding:0;transition:transform .12s}
.cad-swatch-row button:hover{transform:scale(1.1)}
.cad-swatch-row button.on{outline:2px solid var(--ink);outline-offset:1px}
.cad-swatch-none{background:var(--field)!important;color:var(--muted);display:flex;align-items:center;justify-content:center;border:1px solid var(--line)!important}
.cad-seg-pick{display:flex;gap:6px;flex-wrap:wrap}
.cad-seg-pick button{flex:1;min-width:96px;border:1px solid var(--line);background:var(--field);border-radius:9px;padding:9px 6px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.cad-seg-pick button:hover{border-color:var(--line-strong)}
.cad-seg-pick button.on{background:var(--brand-soft);color:var(--brand);border-color:var(--brand)}
.cad-settings-data{display:flex;gap:8px;flex-wrap:wrap}
.cad-settings-data .cad-ghost{flex:1;justify-content:center;display:flex;align-items:center;gap:7px;min-width:120px}
.cad-reset-link{margin-top:16px;border:none;background:none;color:#E8836B;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;padding:6px 0}
.cad-reset-link:hover{text-decoration:underline}
.cad-reset-confirm{margin-top:16px;border:1px solid var(--line);background:var(--field);border-radius:10px;padding:13px;display:flex;flex-direction:column;gap:11px}
.cad-reset-confirm span{font-size:13px;color:var(--ink)}
.cad-reset-confirm>div{display:flex;gap:8px;justify-content:flex-end}
.cad-del-btn{border:none;background:#C2452E;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;transition:background .15s}
.cad-del-btn:hover{background:#a93a26}
.cad-due{font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums}
.cad-cl-badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--muted);background:var(--field);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
.cad-cl-badge.full{color:var(--brand);border-color:var(--brand-soft)}
.cad-row-act{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.cad-row:hover .cad-row-act{opacity:1}
.cad-row-act button{border:none;background:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:7px;display:flex;transition:all .15s}
.cad-row-act button:hover{background:var(--field);color:var(--ink)}

.cad-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.cad-empty svg{color:#3C433F;margin-bottom:12px}
.cad-empty p{font-size:14px}

/* Kanban */
.cad-kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-top:2px}
.cad-kcol{flex:1 1 0;min-width:228px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:10px;display:flex;flex-direction:column;gap:9px}
.cad-kcol-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink);padding:2px 2px;position:relative}
.cad-kdot{flex-shrink:0;width:13px;height:13px;border-radius:50%;border:1px solid rgba(255,255,255,.15);cursor:pointer;padding:0}
.cad-kdot:hover{transform:scale(1.12)}
.cad-kbg{flex-shrink:0;width:14px;height:14px;border-radius:4px;border:1px solid var(--line);cursor:pointer;padding:0;transition:transform .12s}
.cad-kbg:hover{transform:scale(1.12)}
.cad-kcol-name{flex:1;min-width:0;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink);cursor:text;padding:3px 5px;border-radius:6px;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:background .12s}
.cad-kcol-name:hover{background:var(--field)}
.cad-kcol-edit{flex:1;min-width:0;border:1px solid var(--brand);background:var(--surface);color:var(--ink);font-family:inherit;font-size:13px;font-weight:700;border-radius:6px;padding:3px 6px;outline:none}
.cad-kcount{font-size:11px;font-weight:600;color:var(--muted);background:var(--field);border:1px solid var(--line);padding:1px 8px;border-radius:10px;flex-shrink:0}
.cad-kdel{flex-shrink:0;border:none;background:none;color:#565C55;cursor:pointer;padding:3px;border-radius:6px;display:flex;opacity:0;transition:all .12s}
.cad-kcol:hover .cad-kdel{opacity:1}
.cad-kdel:hover{color:#E8836B;background:var(--field)}
.cad-colorpop{position:absolute;top:26px;left:0;z-index:25;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px;box-shadow:0 14px 34px rgba(0,0,0,.5);animation:cadPop .14s ease}
.cad-colorpop button{width:22px;height:22px;border-radius:6px;border:1px solid rgba(255,255,255,.14);cursor:pointer;padding:0;transition:transform .12s}
.cad-colorpop button:hover{transform:scale(1.12)}
.cad-colorpop button.on{outline:2px solid var(--ink);outline-offset:1px}
.cad-cp-none{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--field);color:var(--muted);cursor:pointer}
.cad-cp-none:hover{color:var(--ink);border-color:var(--muted)}
.cad-kadd-col{flex:0 0 auto;width:176px;display:flex;align-items:flex-start}
.cad-kadd-btn{width:100%;border:1px dashed var(--line);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:14px 12px;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.cad-kadd-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.cad-kcol-body{display:flex;flex-direction:column;gap:8px;min-height:80px;flex:1}
.cad-kempty{font-size:12.5px;color:#565C55;text-align:center;padding:18px 8px;border:1px dashed var(--line);border-radius:10px}
.cad-kcard{background:var(--field);border:1px solid var(--line);border-radius:11px;overflow:hidden;cursor:grab;transition:border-color .15s,box-shadow .15s,opacity .15s}
.cad-kcard:hover{border-color:#3A4248}
.cad-kcard:active{cursor:grabbing}
.cad-kcard.done{opacity:.55}
.cad-kcard.dragging{opacity:.4;border-color:var(--brand);box-shadow:0 10px 26px rgba(0,0,0,.5)}
.cad-kcard-img{height:74px;border-bottom:1px solid var(--line);cursor:pointer}
.cad-kcard-img img{width:100%;height:100%;object-fit:cover;display:block}
.cad-kcard-top{display:flex;align-items:flex-start;gap:9px;padding:10px 11px 0}
.cad-kcheck{flex-shrink:0;width:19px;height:19px;border-radius:50%;border:2px solid;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:transform .12s}
.cad-kcheck:hover{transform:scale(1.1)}
.cad-kcard-title{flex:1;border:none;background:none;text-align:left;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:500;color:var(--ink);line-height:1.35;padding:0}
.cad-kcard.done .cad-kcard-title{text-decoration:line-through;color:var(--muted)}
.cad-kcard-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:8px 11px 11px;margin-top:7px}

/* Calendar */
.cad-cal{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:2px}
.cad-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cad-cal-head h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:#EDEFEA}
.cad-cal-nav{display:flex;gap:6px}
.cad-cal-nav button{border:1px solid var(--line);background:var(--field);border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cad-cal-nav button:first-child{padding:0 12px;height:34px}
.cad-cal-nav button:not(:first-child){width:34px;height:34px;color:var(--muted)}
.cad-cal-nav button:hover{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.cad-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.cad-week div{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:4px 0}
.cad-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cad-day{position:relative;min-height:86px;border:1px solid var(--line);background:var(--field);border-radius:10px;padding:6px;cursor:pointer;text-align:left;font-family:inherit;display:flex;flex-direction:column;gap:3px;transition:all .15s;overflow:hidden}
.cad-day:hover{border-color:var(--brand);box-shadow:0 2px 10px rgba(84,167,147,.14)}
.cad-day.out{background:#15191B;opacity:.5}
.cad-day.today{border-color:var(--brand);border-width:2px;background:var(--brand-soft)}
.cad-daynum{font-size:13px;font-weight:600;color:var(--ink);align-self:flex-end;line-height:1}
.cad-day.today .cad-daynum{color:var(--brand);font-weight:700}
.cad-chips{display:flex;flex-direction:column;gap:2px;overflow:hidden}
.cad-cal-hint{font-size:12px;color:var(--muted);margin:-2px 0 12px;display:flex;align-items:center;gap:6px}
.cad-day.over{border-color:var(--brand)!important;background:var(--brand-soft);box-shadow:0 0 0 2px rgba(84,167,147,.4)}
.cad-chip{font-size:10.5px;font-weight:500;color:var(--chip-text);padding:2px 5px;border-radius:4px;border-left:3px solid;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;cursor:grab}
.cad-chip:active{cursor:grabbing}
.cad-chip.cdone{text-decoration:line-through;color:var(--muted);background:var(--chip-done)}
.cad-more{font-size:10px;font-weight:600;color:var(--muted);padding-left:3px}
.cad-dot{position:absolute;top:7px;left:7px;width:7px;height:7px;border-radius:50%;background:#E8836B}
.cad-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
.cad-legend span{display:flex;align-items:center;gap:6px}
.cad-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.cad-legend-od i{border-radius:50%}

.cad-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;animation:cadFade .18s ease}
.cad-modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;width:100%;max-width:480px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.55);animation:cadPop .2s cubic-bezier(.2,.8,.2,1);max-height:90vh;overflow-y:auto}
.cad-modal-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.cad-modal-h h3{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:#EDEFEA}
.cad-modal-h button{border:none;background:none;cursor:pointer;color:var(--muted);padding:5px;border-radius:8px;display:flex;transition:all .15s}
.cad-modal-h button:hover{background:var(--field);color:var(--ink)}
.cad-day-meta{font-size:13px;font-weight:600;margin-top:3px}
.cad-lbl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.cad-lbl:first-of-type{margin-top:0}
.cad-in{width:100%;border:1px solid var(--line);background:var(--field);border-radius:10px;padding:11px 12px;font-size:14.5px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;resize:vertical}
.cad-in::placeholder{color:#5E635C}
.cad-in:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.cad-modal-row{display:flex;gap:14px;flex-wrap:wrap}
.cad-prio-pick{display:flex;gap:6px}
.cad-prio-pick button{flex:1;border:1px solid var(--line);background:var(--field);border-radius:9px;padding:9px 4px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.cad-prio-pick button:hover{border-color:#3A4248}
.cad-status-pick{display:flex;gap:6px;flex-wrap:wrap}
.cad-status-pick button{flex:1 1 calc(50% - 6px);min-width:110px;border:1px solid var(--line);background:var(--field);border-radius:9px;padding:10px 10px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;transition:all .15s}
.cad-status-pick button:hover{border-color:#3A4248}
.cad-modal-f{display:flex;align-items:center;justify-content:space-between;margin-top:22px;gap:10px}
.cad-modal-f-r{display:flex;gap:8px;margin-left:auto}
.cad-del{border:none;background:none;color:#E8836B;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:9px;transition:background .15s}
.cad-del:hover{background:#3A2420}
.cad-ghost{border:1px solid var(--line);background:var(--field);color:var(--ink);cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;transition:all .15s}
.cad-ghost:hover{background:#262D31}
.cad-primary{border:none;background:var(--brand);color:#10201B;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:10px 20px;border-radius:10px;transition:all .15s}
.cad-primary:hover:not(:disabled){background:#62b8a3}
.cad-primary:disabled{opacity:.4;cursor:not-allowed}
.cad-fullbtn{width:100%;justify-content:center;display:flex;align-items:center;gap:7px;margin-top:18px}

.cad-img-add{width:100%;border:1px dashed var(--line);background:var(--field);color:var(--muted);cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;padding:18px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.cad-img-add:hover{border-color:var(--brand);color:var(--brand)}
.cad-img-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.cad-img-wrap img{width:100%;max-height:180px;object-fit:cover;display:block}
.cad-img-acts{position:absolute;top:8px;right:8px;display:flex;gap:6px}
.cad-img-acts button{border:none;background:rgba(14,18,20,.78);color:#E6E9E4;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;backdrop-filter:blur(4px);transition:background .15s}
.cad-img-acts button:hover{background:rgba(14,18,20,.95)}
.cad-img-busy{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;color:var(--muted);font-size:13px;border:1px solid var(--line);border-radius:10px;background:var(--field)}
.cad-spin{animation:cadSpin .9s linear infinite}

.cad-ed{border:1px solid var(--line);background:var(--field);border-radius:10px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.cad-ed:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.cad-ed-bar{display:flex;align-items:center;gap:4px;padding:6px;border-bottom:1px solid var(--line);background:var(--surface);flex-wrap:wrap}
.cad-ed-bar button{border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px;border-radius:7px;padding:5px 9px;display:flex;align-items:center;gap:5px;transition:all .12s}
.cad-ed-bar button:hover{background:var(--field);color:var(--ink);border-color:var(--line)}
.cad-ed-bar .cad-ed-b{width:32px;justify-content:center;font-size:15px}
.cad-ed-bar .cad-ed-b i{font-family:'Fraunces',serif}
.cad-ed-sep{width:1px;height:18px;background:var(--line);margin:0 4px}
.cad-ed-body{padding:11px 12px;display:flex;flex-direction:column;gap:5px;min-height:88px;max-height:240px;overflow-y:auto}
.cad-p-text,.cad-cl-text{outline:none;font-size:14.5px;line-height:1.55;color:var(--ink);min-height:1.55em;word-break:break-word}
[contenteditable][data-ph]:empty:before{content:attr(data-ph);color:#5E635C;pointer-events:none}
.cad-cl{display:flex;align-items:flex-start;gap:9px}
.cad-cl-box{flex-shrink:0;width:19px;height:19px;margin-top:2px;border:2px solid var(--brand);border-radius:5px;background:var(--field);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cad-cl-box[data-on="true"]{background:var(--brand);border-color:var(--brand)}
.cad-cl-box:hover{transform:scale(1.08)}
.cad-cl-text{flex:1}
.cad-cl-text.done{text-decoration:line-through;color:var(--muted)}
.cad-cl-del{flex-shrink:0;border:none;background:none;color:#4A4F49;cursor:pointer;padding:3px;border-radius:6px;display:flex;opacity:0;transition:all .12s;margin-top:2px}
.cad-cl:hover .cad-cl-del{opacity:1}
.cad-cl-del:hover{color:#E8836B;background:var(--surface)}
.cad-ed b,.cad-ed strong{font-weight:700;color:#F2F4EF}
.cad-ed i,.cad-ed em{font-style:italic}

.cad-day-list{display:flex;flex-direction:column;gap:6px}
.cad-day-item{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.cad-day-item.done{opacity:.55}
.cad-day-title{flex:1;border:none;background:none;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--ink)}
.cad-day-title>span:first-child{font-size:14px;font-weight:500}
.cad-day-tags{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.cad-day-item.done .cad-day-title>span:first-child{text-decoration:line-through;color:var(--muted)}
.cad-day-empty{color:var(--muted);font-size:14px;padding:18px 4px;text-align:center}

@keyframes cadFade{from{opacity:0}to{opacity:1}}
@keyframes cadPop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
@keyframes cadSpin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.cad-app *{animation:none!important;transition:none!important}}
@media (max-width:560px){
  .cad-grid .cad-chip{display:none}
  .cad-day{min-height:48px}
  .cad-row-act{opacity:1}
}

/* ---------------------------- Thème clair ---------------------------- */
.cad-app.light{
  --bg:#F3F5F1; --surface:#FFFFFF; --field:#EFF1EC;
  --ink:#232823; --muted:#697066; --line:#E3E5DE; --line-strong:#CFD2C9;
  --brand:#3E8F77; --brand-soft:#E0EFE9;
  --chip-text:#333831; --chip-done:#E7E9E3;
  color-scheme:light;
}
.cad-app.light .cad-brand h1,
.cad-app.light .cad-cal-head h2,
.cad-app.light .cad-modal-h h3{color:#161A16}
.cad-app.light .cad-ed b,.cad-app.light .cad-ed strong{color:#121511}
.cad-app.light .cad-qtitle::placeholder,
.cad-app.light .cad-in::placeholder,
.cad-app.light [contenteditable][data-ph]:empty:before{color:#A2A69D}
.cad-app.light .cad-empty svg{color:#C8CCC2}
.cad-app.light .cad-grip,
.cad-app.light .cad-kempty,
.cad-app.light .cad-kdel,
.cad-app.light .cad-cl-del{color:#AEB2A9}
.cad-app.light .cad-rc-text{color:#3B403A}
.cad-app.light .cad-row:hover,
.cad-app.light .cad-prio-pick button:hover,
.cad-app.light .cad-status-pick button:hover,
.cad-app.light .cad-kcard:hover,
.cad-app.light .cad-sort-btn:hover{border-color:#CFD2C9}
.cad-app.light .cad-row:hover{box-shadow:0 2px 12px rgba(30,40,30,.08)}
.cad-app.light .cad-row.dragging,
.cad-app.light .cad-kcard.dragging{box-shadow:0 10px 26px rgba(30,40,30,.16)}
.cad-app.light .cad-overlay{background:rgba(30,38,30,.38)}
.cad-app.light .cad-modal{box-shadow:0 24px 60px rgba(30,40,30,.22)}
.cad-app.light .cad-sort-menu,
.cad-app.light .cad-colorpop{box-shadow:0 14px 34px rgba(30,40,30,.18)}
.cad-app.light .cad-day.out{background:#EAECE6}
.cad-app.light .cad-ghost:hover{background:#EAECE5}
`;

import { createRoot } from "react-dom/client";
var __boot=document.getElementById("boot");
if(__boot)__boot.remove();
createRoot(document.getElementById("root")).render(<App />);
</script>
