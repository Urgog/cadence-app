<!-- 1) Pont de stockage : remplace window.storage (propre à Claude) par localStorage -->
<script>
(function () {
  var PFX = "cad:";
  window.storage = {
    get: function (key) {
      return Promise.resolve().then(function () {
        var v = localStorage.getItem(PFX + key);
        return v === null ? null : { key: key, value: v, shared: false };
      });
    },
    set: function (key, value) {
      return Promise.resolve().then(function () {
        localStorage.setItem(PFX + key, value);
        return { key: key, value: value, shared: false };
      });
    },
    delete: function (key) {
      return Promise.resolve().then(function () {
        localStorage.removeItem(PFX + key);
        return { key: key, deleted: true, shared: false };
      });
    },
    list: function (prefix) {
      return Promise.resolve().then(function () {
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.indexOf(PFX) === 0) {
            var bare = k.slice(PFX.length);
            if (!prefix || bare.indexOf(prefix) === 0) keys.push(bare);
          }
        }
        return { keys: keys, prefix: prefix, shared: false };
      });
    }
  };
})();
</script>

/* ----------------------------- Date utilities ----------------------------- */
const pad = (n) => String(n).padStart(2, "0");
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};
const parseLocal = (s) => {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
};
const addDays = (s, n) => {
  const d = parseLocal(s);
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};
const diffDays = (a, b) => Math.round((parseLocal(a) - parseLocal(b)) / 86400000);

const MOIS = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet",
  "août", "septembre", "octobre", "novembre", "décembre"];
const JOURS = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

const longDate = (s) => {
  const d = parseLocal(s);
  return `${d.getDate()} ${MOIS[d.getMonth()]} ${d.getFullYear()}`;
};
const shortDate = (s) => {
  const d = parseLocal(s);
  return `${d.getDate()} ${MOIS[d.getMonth()].slice(0, 4)}.`;
};

const dateMeta = (due) => {
  if (!due) return null;
  const n = diffDays(due, todayStr());
  if (n < 0) return { level: "overdue", label: n === -1 ? "Hier" : `Il y a ${-n} j`, prefix: "En retard" };
  if (n === 0) return { level: "today", label: "Aujourd'hui" };
  if (n === 1) return { level: "soon", label: "Demain" };
  if (n <= 6) return { level: "soon", label: `Dans ${n} j` };
  return { level: "later", label: shortDate(due) };
};

/* ------------------------------ Image helper ------------------------------ */
const MAX_IMG_DIM = 1100;
const fileToBanner = (file) => new Promise((resolve, reject) => {
  if (!file || !file.type.startsWith("image/")) { reject(new Error("not-image")); return; }
  const reader = new FileReader();
  reader.onerror = () => reject(reader.error);
  reader.onload = () => {
    const img = new window.Image();
    img.onerror = () => reject(new Error("decode"));
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      const scale = Math.min(1, MAX_IMG_DIM / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale));
      h = Math.max(1, Math.round(h * scale));
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#1C2226"; ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      let q = 0.82, out = c.toDataURL("image/jpeg", q);
      while (out.length > 900000 && q > 0.45) { q -= 0.12; out = c.toDataURL("image/jpeg", q); }
      resolve(out);
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
});

// Logo : recadrage carré centré + redimensionnement à 256px (PNG pour garder la transparence)
const fileToLogo = (file) => new Promise((resolve, reject) => {
  if (!file || !file.type.startsWith("image/")) { reject(new Error("not-image")); return; }
  const reader = new FileReader();
  reader.onerror = () => reject(reader.error);
  reader.onload = () => {
    const img = new window.Image();
    img.onerror = () => reject(new Error("decode"));
    img.onload = () => {
      const side = Math.min(img.naturalWidth, img.naturalHeight);
      const target = 256;
      const c = document.createElement("canvas");
      c.width = target; c.height = target;
      const ctx = c.getContext("2d");
      const sx = (img.naturalWidth - side) / 2, sy = (img.naturalHeight - side) / 2;
      ctx.clearRect(0, 0, target, target);
      ctx.drawImage(img, sx, sy, side, side, 0, 0, target, target);
      resolve(c.toDataURL("image/png"));
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
});

const _rgb = (hex) => { let h = (hex || "#000").replace("#", ""); if (h.length === 3) h = h.split("").map((c) => c + c).join(""); return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)]; };
const _hex = (r, g, b) => "#" + [r, g, b].map((v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("");
const mix = (hex, target, amt) => { const a = _rgb(hex), b = _rgb(target); return _hex(a[0] + (b[0] - a[0]) * amt, a[1] + (b[1] - a[1]) * amt, a[2] + (b[2] - a[2]) * amt); };

const LEVEL_MAX = 100;
const needFor = (level, base) => Math.max(10, Math.round((base || 60) * Math.sqrt(level)));
const levelFromXp = (xp, base) => {
  let lvl = 1, rem = Math.max(0, xp | 0), need = needFor(1, base);
  while (lvl < LEVEL_MAX && rem >= need) { rem -= need; lvl++; need = needFor(lvl, base); }
  if (lvl >= LEVEL_MAX) { const n = needFor(LEVEL_MAX, base); return { level: LEVEL_MAX, into: n, need: n }; }
  return { level: lvl, into: rem, need };
};

const evalAchievements = (p, base, tierFrameMap) => {
  const tfm = tierFrameMap || GAME_DEFAULT.tierFrameMap;
  const lvl = levelFromXp(p.xp, base).level;
  const unlocked = [];
  let pts = p.successPts || 0, ach = p.achievements, hist = p.history,
      frames = Array.isArray(p.unlockedFrames) ? p.unlockedFrames : [],
      titles = Array.isArray(p.unlockedTitles) ? p.unlockedTitles : [];
  for (const a of ACHIEVEMENTS) {
    if (ach.includes(a.id)) continue;
    if (a.test(p.stats, lvl)) {
      ach = [...ach, a.id];
      pts += a.pts || 0;
      if (a.tierAchievement != null) {
        const fi = tfm[a.tierAchievement];
        if (fi != null && !frames.includes(fi)) frames = [...frames, fi];
      }
      // Titre de palier
      if (a.tierTitle && !titles.includes(a.tierTitle)) titles = [...titles, a.tierTitle];
      // Cadre Légendaire (C8) débloqué exclusivement au niveau 100
      if (a.id === "lvl100" && !frames.includes(8)) frames = [...frames, 8];
      hist = [ev("achievement", "Haut fait : " + a.name, { pts: a.pts || 0 }), ...hist];
      unlocked.push(a);
    }
  }
  return { player: { ...p, successPts: pts, achievements: ach, history: hist, unlockedFrames: frames, unlockedTitles: titles }, unlocked };
};

function AvatarBitmap({ level = 1, size = 64 }) {
  const ti  = avatarTier(level);
  const t   = AVATAR_TIERS[ti];
  const src = TIER_SPRITES[ti];
  const r   = Math.round(size * 0.12);
  const gSz = Math.round(size * 0.26);
  return (
    <span style={{
      display:"block", width:size, height:size, borderRadius:r,
      background:t.bg, position:"relative", overflow:"hidden",
      boxShadow: t.aura
        ? `0 0 ${gSz}px ${t.auraColor}55, 0 0 ${Math.round(gSz*0.4)}px ${t.auraColor}33`
        : "none",
    }}>
      {src && (
        <img src={src} alt="" style={{
          position:"absolute", bottom:0, left:"50%",
          transform:"translateX(-50%)",
          maxHeight:"96%", maxWidth:"96%", width:"auto",
          imageRendering:"pixelated",
          userSelect:"none", pointerEvents:"none",
        }} />
      )}
      {t.aura && (
        <span style={{
          position:"absolute", inset:0, borderRadius:r, pointerEvents:"none",
          boxShadow:`inset 0 0 ${Math.round(size*0.18)}px ${t.auraColor}44`,
        }} />
      )}
    </span>
  );
}

const FRAME_NAMES = ["Bronze","Argent","Vert","Bleu","Violet","Or","Orange","Rose","Légendaire"];

function AvatarFrame({ frameIndex, size, tint }) {
  const src = FRAME_SPRITES[frameIndex];
  if (src == null) return null;
  return (
    <div style={{position:"absolute",left:0,top:0,width:size,height:size,pointerEvents:"none",zIndex:2,isolation:"isolate"}}>
      <img src={src} alt="" style={{position:"absolute",left:0,top:0,width:size,height:size,imageRendering:"auto"}} />
      {tint && <div style={{position:"absolute",inset:0,background:tint,mixBlendMode:"color",pointerEvents:"none"}} />}
    </div>
  );
}


function Avatar({ level, size, frame, large, frameTint }) {
  const styled = frame != null;
  // Fenêtre intérieure du cadre ≈ 68% de la taille, centrée avec léger décalage haut
  const inner = styled ? Math.round(size * 0.68) : size;
  const padL  = styled ? Math.round((size - inner) / 2) : 0;
  const padT  = styled ? Math.round(size * 0.10) : 0;
  return (
    <span className={"cad-avatar-wrap" + (large ? " cad-avatar-lg" : "") + (styled ? " framed" : "")}>
      <span className="cad-avatar-inner" style={{ width: size, height: size, position: "relative", overflow:"visible" }}>
        <span style={{ position: "absolute", left: padL, top: padT, zIndex:1 }}>
          <AvatarBitmap level={level} size={inner} />
        </span>
        {styled && <AvatarFrame frameIndex={frame} size={size} tint={frameTint} />}
      </span>
    </span>
  );
}

function PlayerBar({ player, lvl, frame, onProfile, onShop }) {
  const pct = Math.min(100, Math.round((lvl.into / lvl.need) * 100));
  return (
    <div className="cad-player">
      <button className="cad-player-id" onClick={onProfile} title="Voir le profil">
        <Avatar level={lvl.level} size={48} frame={frame} />
        <span className="cad-player-meta">
          <span className="cad-player-name">{player.name}{player.title ? <em className="cad-player-title">{player.title}</em> : null}</span>
          <span className="cad-player-lvl">Niveau {lvl.level} · {AVATAR_NAMES[avatarTier(lvl.level)]}</span>
        </span>
      </button>
      <div className="cad-xp">
        <div className="cad-xp-bar"><div className="cad-xp-fill" style={{ width: pct + "%" }} /></div>
        <span className="cad-xp-txt">{lvl.into} / {lvl.need} XP</span>
      </div>
      <div className="cad-coins" title="Pièces"><Coins size={15} /> <strong>{player.coins}</strong></div>
      <button className="cad-shop-btn" onClick={onShop}><Store size={16} /> <span>Boutique</span></button>
    </div>
  );
}

function ProfileModal({ player, lvl, doneCount, shopItems, frame, cfg, setPlayerName, equip, onClose }) {
  const [tab, setTab] = useState("profil");
  const pct = Math.min(100, Math.round((lvl.into / lvl.need) * 100));
  const unlockedTitles = player.unlockedTitles || [];
  const unlocked = ACHIEVEMENTS.filter((a) => player.achievements.includes(a.id)).length;
  return (
    <Overlay onClose={onClose}>
      <div className="cad-modal" onClick={(e) => e.stopPropagation()}>
        <div className="cad-modal-h"><h3>Profil</h3><button onClick={onClose} aria-label="Fermer"><X size={18} /></button></div>

        <div className="cad-profile-top">
          <Avatar level={lvl.level} size={120} frame={frame} large />
          <div className="cad-profile-info">
            <div className="cad-profile-lvl">Niveau {lvl.level} · {AVATAR_NAMES[avatarTier(lvl.level)]}</div>
            {player.title ? <div className="cad-profile-title">{player.title}</div> : null}
            <div className="cad-xp">
              <div className="cad-xp-bar"><div className="cad-xp-fill" style={{ width: pct + "%" }} /></div>
              <span className="cad-xp-txt">{lvl.into} / {lvl.need} XP</span>
            </div>
          </div>
        </div>

        <div className="cad-tabs">
          <button className={tab === "profil" ? "on" : ""} onClick={() => setTab("profil")}>Profil</button>
          <button className={tab === "apparence" ? "on" : ""} onClick={() => setTab("apparence")}>Apparence</button>
          <button className={tab === "equip" ? "on" : ""} onClick={() => setTab("equip")}>Équipement</button>
          <button className={tab === "faits" ? "on" : ""} onClick={() => setTab("faits")}>Hauts faits <span className="cad-tab-c">{unlocked}/{ACHIEVEMENTS.length}</span></button>
          <button className={tab === "histoire" ? "on" : ""} onClick={() => setTab("histoire")}>Historique</button>
        </div>

        {tab === "equip" && (
          <div className="cad-tabpane">
            <div className="cad-equip-preview" style={{textAlign:"center",padding:"16px 0"}}>
              <Avatar level={lvl.level} size={120} frame={frame} large />
            </div>
            <p className="cad-hint" style={{marginTop:12}}>
              🗡️ <strong>Armes &amp; accessoires personnalisés — prochainement.</strong><br/>
              Vous pourrez importer vos propres sprites et les positionner librement sur le personnage.
            </p>
          </div>
        )}

        {tab === "apparence" && (
          <div className="cad-tabpane">
            <p className="cad-hint" style={{marginTop:8}}>
              🎨 <strong>Personnalisation d'apparence — prochainement.</strong><br/>
              L'avatar évolue automatiquement avec votre palier (9 formes du Paysan au Héros Légendaire).
            </p>
          </div>
        )}

        {tab === "profil" && (
          <div className="cad-tabpane">
            <div className="cad-profile-stats">
              <div><strong>{doneCount}</strong><span>Tâches terminées</span></div>
              <div><strong>{player.xp}</strong><span>XP totale</span></div>
              <div><strong>{player.coins}</strong><span>Pièces</span></div>
              <div><strong>{player.successPts||0}</strong><span>Points de succès</span></div>
            </div>
            <label className="cad-lbl">Nom du joueur</label>
            <input className="cad-in" value={player.name} onChange={(e) => setPlayerName(e.target.value)} placeholder="Votre nom" />
            {unlockedTitles.length > 0 && (
              <>
                <label className="cad-lbl">Titre</label>
                <div className="cad-equip-row">
                  <button className={!player.title ? "on" : ""} onClick={() => equip("title", null)}>Aucun</button>
                  {unlockedTitles.map((t) => (
                    <button key={t} className={player.title === t ? "on" : ""} onClick={() => equip("title", t)}>{t}</button>
                  ))}
                </div>
              </>
            )}
            {unlockedTitles.length === 0 && (
              <p className="cad-hint">Atteignez le palier&nbsp;1 (niveau&nbsp;12) pour débloquer votre premier titre.</p>
            )}
            <label className="cad-lbl">Cadre d'avatar</label>
            <div className="cad-equip-row" style={{flexWrap:"wrap",gap:6}}>
              <button className={player.frame == null ? "on" : ""} onClick={() => equip("frame", null)}>Aucun</button>
              {(player.unlockedFrames||[0]).map((fi) => (
                <button key={fi} className={player.frame === fi ? "on" : ""} onClick={() => equip("frame", fi)}
                  style={{padding:2,lineHeight:0}}>
                  <img src={FRAME_SPRITES[fi]} alt={`Cadre ${fi}`} style={{width:36,height:36,imageRendering:"auto"}} />
                </button>
              ))}
            </div>
            <p className="cad-hint">Les cadres et titres se débloquent via les hauts faits de palier.</p>
          </div>
        )}

        {tab === "faits" && (
          <div className="cad-tabpane">
            <div className="cad-ach-grid">

function RewardToast({ reward }) {
  if (!reward) return null;
  const hasR = reward.xp || reward.coins;
  return (
    <div className="cad-toast" key={reward.id}>
      <span className="cad-toast-title">{hasR ? "Tâche terminée !" : "Bravo !"}</span>
      {hasR ? (
        <span className="cad-toast-rewards">
          {reward.xp ? <span className="cad-toast-xp">+{reward.xp} XP</span> : null}
          {reward.coins ? <span className="cad-toast-coin"><Coins size={13} /> +{reward.coins}</span> : null}
        </span>
      ) : null}
      {reward.ach && reward.ach.length ? (
        <span className="cad-toast-ach">🏆 {reward.ach.join(" · ")}</span>
      ) : null}
    </div>
  );
}

function App() {
  const [tasks, setTasks] = useState([]);
  const [statuses, setStatuses] = useState(DEFAULT_STATUSES);
  const statusMap = useMemo(() => Object.fromEntries(statuses.map((s) => [s.id, s])), [statuses]);
  const statusOrder = useMemo(() => Object.fromEntries(statuses.map((s, i) => [s.id, i])), [statuses]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("list");
  const [appName, setAppName] = useState("Les tâches à Toto");
  const [themePref, setThemePref] = useState("dark");
  const [systemDark, setSystemDark] = useState(() => typeof window !== "undefined" && window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)").matches : true);
  const [logo, setLogo] = useState(null);
  const [editingName, setEditingName] = useState(false);
  const [nameDraft, setNameDraft] = useState("");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [defaultView, setDefaultView] = useState("list");
  const [filter, setFilter] = useState("active");
  const [sort, setSort] = useState("smart");
  const [dragId, setDragId] = useState(null);
  const [monthCursor, setMonthCursor] = useState(() => {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [editing, setEditing] = useState(null);
  const [dayModal, setDayModal] = useState(null);

  const [qTitle, setQTitle] = useState("");
  const [qDue, setQDue] = useState("");
  const [qRarity, setQRarity] = useState("commune");

  const [player, setPlayer] = useState(PLAYER_DEFAULT);
  const [gameConfig, setGameConfig] = useState(() => normalizeGame(GAME_DEFAULT));
  const [profileOpen, setProfileOpen] = useState(false);
  const [shopOpen, setShopOpen] = useState(false);
  const [gameCfgOpen, setGameCfgOpen] = useState(false);
  const [toast, setToast] = useState(null);

  /* ---- persistence ---- */
  useEffect(() => {
    (async () => {
      try {
        if (typeof window !== "undefined" && window.storage) {
          const rn = await window.storage.get("app:name");
          if (rn && rn.value) setAppName(rn.value);
          const rt = await window.storage.get("app:theme");
          if (rt && ["light", "dark", "system"].includes(rt.value)) setThemePref(rt.value);
          const rl = await window.storage.get("app:logo");
          if (rl && rl.value) setLogo(rl.value);
          const rp = await window.storage.get("player:data");
          if (rp && rp.value) { try { setPlayer(normalizePlayer(JSON.parse(rp.value))); } catch (e) {} }
          const rg = await window.storage.get("game:config");
          if (rg && rg.value) { try { setGameConfig(normalizeGame(JSON.parse(rg.value))); } catch (e) {} }
          const rv = await window.storage.get("app:defaultView");
          if (rv && rv.value && ["list", "kanban", "calendar"].includes(rv.value)) { setDefaultView(rv.value); setView(rv.value); }
        }
      } catch (e) { /* defaults */ }
      try {
        if (typeof window !== "undefined" && window.storage) {
          const rs = await window.storage.get("statuses:all");
          if (rs && rs.value) setStatuses(ensureCore(JSON.parse(rs.value)));
        }
      } catch (e) { /* default statuses */ }
      try {
        if (typeof window !== "undefined" && window.storage) {
          const res = await window.storage.get("tasks:all");
          if (res && res.value) { setTasks(JSON.parse(res.value).map(migrate)); setLoaded(true); return; }
        }
      } catch (e) { /* first run */ }
      setTasks(seed());
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        if (typeof window !== "undefined" && window.storage)
          await window.storage.set("tasks:all", JSON.stringify(tasks));
      } catch (e) { /* ignore */ }
    })();
  }, [tasks, loaded]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        if (typeof window !== "undefined" && window.storage)
          await window.storage.set("statuses:all", JSON.stringify(statuses));
      } catch (e) { /* ignore */ }
    })();
  }, [statuses, loaded]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { if (typeof window !== "undefined" && window.storage) await window.storage.set("app:name", appName); } catch (e) {}
    })();
  }, [appName, loaded]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { if (typeof window !== "undefined" && window.storage) await window.storage.set("player:data", JSON.stringify(player)); } catch (e) {}
    })();
  }, [player, loaded]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { if (typeof window !== "undefined" && window.storage) await window.storage.set("game:config", JSON.stringify(gameConfig)); } catch (e) {}
    })();
  }, [gameConfig, loaded]);

  useEffect(() => {
    if (!toast) return;
    const id = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(id);
  }, [toast]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { if (typeof window !== "undefined" && window.storage) await window.storage.set("app:theme", themePref); } catch (e) {}
    })();
  }, [themePref, loaded]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        if (typeof window !== "undefined" && window.storage) {
          if (logo) await window.storage.set("app:logo", logo);
          else await window.storage.delete("app:logo");
        }
      } catch (e) {}
    })();
  }, [logo, loaded]);

  useEffect(() => {
    if (typeof window === "undefined" || !window.matchMedia) return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const h = (e) => setSystemDark(e.matches);
    if (mq.addEventListener) mq.addEventListener("change", h); else mq.addListener(h);
    return () => { if (mq.removeEventListener) mq.removeEventListener("change", h); else mq.removeListener(h); };
  }, []);

  useEffect(() => { if (typeof document !== "undefined") document.title = appName || "Tâches"; }, [appName]);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try { if (typeof window !== "undefined" && window.storage) await window.storage.set("app:defaultView", defaultView); } catch (e) {}
    })();
  }, [defaultView, loaded]);

  const exportData = () => {
    const payload = { app: "cadence", version: 1, exportedAt: new Date().toISOString(),
      settings: { appName, theme: themePref, defaultView, logo }, player, game: gameConfig, statuses, tasks };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = ((appName || "taches").replace(/[^a-z0-9-_]+/gi, "-").toLowerCase() || "taches") + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };
  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (Array.isArray(d.tasks)) setTasks(d.tasks.map(migrate));
        if (Array.isArray(d.statuses)) setStatuses(ensureCore(d.statuses));
        if (d.player && typeof d.player === "object") setPlayer(normalizePlayer(d.player));
        if (d.game && typeof d.game === "object") setGameConfig(normalizeGame(d.game));
        if (d.settings) {
          if (d.settings.appName) setAppName(d.settings.appName);
          if (["light", "dark", "system"].includes(d.settings.theme)) setThemePref(d.settings.theme);
          if (["list", "kanban", "calendar"].includes(d.settings.defaultView)) setDefaultView(d.settings.defaultView);
          if (typeof d.settings.logo === "string") setLogo(d.settings.logo);
          else if (d.settings.logo === null) setLogo(null);
        }
      } catch (e) { /* fichier invalide */ }
    };
    reader.readAsText(file);
  };
  const resetAll = () => {
    setTasks([]);
    setStatuses(DEFAULT_STATUSES);
    setAppName("Les tâches à Toto");
    setThemePref("dark");
    setLogo(null);
    setDefaultView("list");
    setView("list");
    setPlayer(normalizePlayer(PLAYER_DEFAULT));
    setGameConfig(normalizeGame(GAME_DEFAULT));
  };

  const commitName = () => { const v = nameDraft.trim(); if (v) setAppName(v); setEditingName(false); };

  /* ---- récompenses ---- */
  const applyReward = (task) => {
    const cfg = gameConfig;
    const rw = rewardFor(task, cfg);
    const before = levelFromXp(player.xp, cfg.xpBase).level;
    const xp = player.xp + rw.xp;
    const after = levelFromXp(xp, cfg.xpBase).level;
    const stats = { ...player.stats, completed: player.stats.completed + 1, [task.rarity]: (player.stats[task.rarity] || 0) + 1, earned: player.stats.earned + rw.coins };
    let hist = [ev("task", "« " + (task.title || "Tâche") + " » terminée", { xp: rw.xp, coins: rw.coins }), ...player.history];
    if (after > before) hist = [ev("level", "Niveau " + after + " atteint !"), ...hist];
    let np = { ...player, xp, coins: player.coins + rw.coins, stats, history: hist };
    const res = evalAchievements(np, cfg.xpBase, cfg.tierFrameMap);
    np = res.player; np.history = np.history.slice(0, 80);
    setPlayer(np);
    setToast({ id: Date.now(), xp: rw.xp, coins: rw.coins, ach: res.unlocked.map((a) => a.name) });
  };
  const buyItem = (item) => {
    if (player.purchased.includes(item.id) || player.coins < item.price) return;
    const stats = { ...player.stats, spent: player.stats.spent + item.price };
    let np = {
      ...player, coins: player.coins - item.price, purchased: [...player.purchased, item.id], stats,
      history: [ev("buy", "Achat : " + item.name, { coins: -item.price }), ...player.history],
    };
    const res = evalAchievements(np, gameConfig.xpBase, gameConfig.tierFrameMap);
    np = res.player; np.history = np.history.slice(0, 80);
    setPlayer(np);
    if (res.unlocked.length) setToast({ id: Date.now(), xp: 0, coins: 0, ach: res.unlocked.map((a) => a.name) });
  };
  const equip = (kind, value) => setPlayer((p) => ({ ...p, [kind]: value }));
  const setPlayerName = (name) => setPlayer((p) => ({ ...p, name }));

  /* ---- task ops ---- */
  const upsert = (task) => setTasks((prev) => {
    const exists = prev.some((t) => t.id === task.id);
    return exists ? prev.map((t) => (t.id === task.id ? task : t)) : [...prev, task];
  });
  // Sauvegarde depuis la fiche tâche : récompense si la tâche devient « terminée » pour la 1re fois
  const saveTask = (task) => {
    const prevTask = tasks.find((x) => x.id === task.id);
    const wasRewarded = prevTask ? prevTask.rewarded : false;
    const becomingDone = task.status === "done" && !wasRewarded;
    upsert({ ...task, rewarded: wasRewarded || becomingDone });
    if (becomingDone) applyReward(task);
  };
  const markStatus = (id, status) => {
    const t = tasks.find((x) => x.id === id);
    setTasks((p) => p.map((x) => (x.id === id ? { ...withStatus(x, status), rewarded: x.rewarded || status === "done" } : x)));
    if (t && status === "done" && !t.rewarded) applyReward(t);
  };
  const toggle = (id) => { const t = tasks.find((x) => x.id === id); markStatus(id, t && t.done ? "todo" : "done"); };
  const setStatus = (id, status) => markStatus(id, status);
  const setDue = (id, due) => setTasks((p) => p.map((t) => (t.id === id ? { ...t, due: due || null } : t)));
  const remove = (id) => setTasks((p) => p.filter((t) => t.id !== id));
  const toggleCheckItem = (taskId, blockId) => setTasks((p) => p.map((t) => {
    if (t.id !== taskId) return t;
    const blocks = normalizeDesc(t.desc).map((b) => (b.id === blockId ? { ...b, checked: !b.checked } : b));
    return { ...t, desc: blocks };
  }));
  // reorder (and optionally restatus) within the canonical array
  const moveTask = (fromId, toId, status) => {
    const src = tasks.find((x) => x.id === fromId);
    const becomingDone = src && status === "done" && !src.rewarded;
    setTasks((prev) => {
      const a = [...prev];
      const from = a.findIndex((t) => t.id === fromId);
      if (from < 0) return prev;
      let moved = a[from];
      if (status && status !== moved.status) moved = withStatus(moved, status);
      if (status === "done") moved = { ...moved, rewarded: moved.rewarded || true };
      a.splice(from, 1);
      let to = toId == null ? a.length : a.findIndex((t) => t.id === toId);
      if (to < 0) to = a.length;
      a.splice(to, 0, moved);
      return a;
    });
    if (becomingDone) applyReward(src);
  };

  const renameStatus = (id, label) => setStatuses((p) => p.map((s) => (s.id === id ? { ...s, label } : s)));
  const recolorStatus = (id, color) => setStatuses((p) => p.map((s) => (s.id === id ? { ...s, color } : s)));
  const setStatusBg = (id, bg) => setStatuses((p) => p.map((s) => (s.id === id ? { ...s, bg } : s)));
  const setStatusIcon = (id, icon) => setStatuses((p) => p.map((s) => (s.id === id ? { ...s, icon } : s)));
  const addStatus = () => setStatuses((p) => {
    const id = "st_" + uid();
    const ns = { id, label: "Nouvelle catégorie", color: PALETTE[p.length % PALETTE.length], locked: false };
    const i = p.findIndex((s) => s.id === "done");
    const c = [...p];
    if (i < 0) c.push(ns); else c.splice(i, 0, ns);
    return c;
  });
  const removeStatus = (id) => {
    setStatuses((p) => { const s = p.find((x) => x.id === id); return (!s || s.locked) ? p : p.filter((x) => x.id !== id); });
    setTasks((p) => p.map((t) => (t.status === id ? withStatus(t, "todo") : t)));
  };

  useEffect(() => {
    const h = (e) => { if (e.key === "Escape") { setEditing(null); setDayModal(null); } };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const quickAdd = () => {
    if (!qTitle.trim()) return;
    upsert(withStatus({ id: uid(), title: qTitle.trim(), desc: [], image: null, due: qDue || null, rarity: qRarity, created: Date.now() }, "todo"));
    setQTitle(""); setQDue("");
  };

  const counts = useMemo(() => ({
    active: tasks.filter((t) => !t.done).length,
    done: tasks.filter((t) => t.done).length,
    overdue: tasks.filter((t) => !t.done && t.due && diffDays(t.due, todayStr()) < 0).length,
  }), [tasks]);

  const resolvedTheme = themePref === "system" ? (systemDark ? "dark" : "light") : themePref;
  const lvl = levelFromXp(player.xp, gameConfig.xpBase);
  const doneCount = player.stats.completed;
  const rv = useMemo(() => rarityView(gameConfig), [gameConfig]);
  // frame = entier 0-8 ou null (débloqué via hauts faits)
  const equippedFrame = (player.frame != null && (player.unlockedFrames||[]).includes(player.frame))
    ? player.frame : null;

  const views = [
    { k: "list", label: "Liste", icon: <ListIcon size={16} /> },
    { k: "kanban", label: "Kanban", icon: <LayoutGrid size={16} /> },
    { k: "calendar", label: "Calendrier", icon: <CalendarIcon size={16} /> },
  ];

  return (
    <StatusCtx.Provider value={{ list: statuses, map: statusMap, order: statusOrder }}>
    <GameCtx.Provider value={rv}>
    <div className={"cad-app" + (resolvedTheme === "light" ? " light" : "")}>
      <style>{CSS}</style>

      <div className="cad-shell">
        <header className="cad-head">
          <div className="cad-brand">
            <div className={"cad-mark" + (logo ? " has-logo" : "")}>
              {logo ? <img src={logo} alt="Logo" /> : (appName.trim()[0] || "T").toUpperCase()}
            </div>
            <div>
              {editingName ? (
                <input className="cad-name-edit" autoFocus value={nameDraft}
                  onChange={(e) => setNameDraft(e.target.value)} onBlur={commitName}
                  onKeyDown={(e) => { if (e.key === "Enter") commitName(); if (e.key === "Escape") setEditingName(false); }} />
              ) : (
                <h1 onClick={() => { setNameDraft(appName); setEditingName(true); }} title="Cliquer pour renommer l'application">{appName}</h1>
              )}
              <p>{counts.active} en cours · {counts.overdue > 0 ? <span className="cad-od">{counts.overdue} en retard</span> : "à jour"}</p>
            </div>
          </div>
          <div className="cad-head-r">
            <div className="cad-seg">
              {views.map((v) => (
                <button key={v.k} className={view === v.k ? "on" : ""} onClick={() => setView(v.k)}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
            <button className="cad-theme-btn" onClick={() => setThemePref(resolvedTheme === "dark" ? "light" : "dark")}
              title={resolvedTheme === "light" ? "Passer en mode sombre" : "Passer en mode clair"} aria-label="Changer de thème">
              {resolvedTheme === "light" ? <Moon size={18} /> : <Sun size={18} />}
            </button>
            <button className="cad-theme-btn" onClick={() => setSettingsOpen(true)} title="Paramètres" aria-label="Paramètres">
              <Settings size={18} />
            </button>
          </div>
        </header>

        <PlayerBar player={player} lvl={lvl} frame={equippedFrame} onProfile={() => setProfileOpen(true)} onShop={() => setShopOpen(true)} />

        <QuickAdd qTitle={qTitle} setQTitle={setQTitle} qDue={qDue} setQDue={setQDue}
          qRarity={qRarity} setQRarity={setQRarity} quickAdd={quickAdd} />

        {view === "list" && (
          <ListView
            tasks={tasks} filter={filter} setFilter={setFilter} counts={counts}
            sort={sort} setSort={setSort} moveTask={moveTask} dragId={dragId} setDragId={setDragId}
            toggle={toggle} remove={remove} onEdit={setEditing} onToggleCheck={toggleCheckItem}
          />
        )}
        {view === "kanban" && (
          <KanbanView
            tasks={tasks} statuses={statuses} onEdit={setEditing} moveTask={moveTask}
            dragId={dragId} setDragId={setDragId} toggle={toggle}
            rename={renameStatus} recolor={recolorStatus} setBg={setStatusBg} setIcon={setStatusIcon} addStatus={addStatus} removeStatus={removeStatus}
          />
        )}
        {view === "calendar" && (
          <CalendarView
            tasks={tasks} monthCursor={monthCursor} setMonthCursor={setMonthCursor}
            onDay={setDayModal} dragId={dragId} setDragId={setDragId} setDue={setDue}
          />
        )}
      </div>

      {editing && (
        <TaskModal
          initial={editing.new ? { due: editing.due || "" } : editing}
          isNew={!!editing.new}
          onClose={() => setEditing(null)}
          onSave={(t) => { saveTask(t); setEditing(null); }}
          onDelete={(id) => { remove(id); setEditing(null); }}
        />
      )}

      {dayModal && (
        <DayModal
          date={dayModal}
          tasks={tasks.filter((t) => t.due === dayModal)}
          onClose={() => setDayModal(null)}
          toggle={toggle}
          onEdit={(t) => { setDayModal(null); setEditing(t); }}
          onAdd={() => { const d = dayModal; setDayModal(null); setEditing({ new: true, due: d }); }}
        />
      )}
      {settingsOpen && (
        <SettingsModal appName={appName} setAppName={setAppName} themePref={themePref} setThemePref={setThemePref}
          logo={logo} setLogo={setLogo}
          defaultView={defaultView} setDefaultView={setDefaultView}
          onCustomize={() => { setSettingsOpen(false); setGameCfgOpen(true); }}
          onExport={exportData} onImport={importData} onReset={resetAll} onClose={() => setSettingsOpen(false)} />
      )}

      {profileOpen && (
        <ProfileModal player={player} lvl={lvl} doneCount={doneCount} shopItems={gameConfig.shop} frame={equippedFrame}
          cfg={gameConfig}
          setPlayerName={setPlayerName} equip={equip} onClose={() => setProfileOpen(false)} />
      )}

      {shopOpen && (
        <ShopModal player={player} items={gameConfig.shop} lvl={lvl} buyItem={buyItem} onClose={() => setShopOpen(false)} />
      )}

      {gameCfgOpen && (
        <GameConfigModal cfg={gameConfig} setGameConfig={setGameConfig} onClose={() => setGameCfgOpen(false)} />
      )}

      <RewardToast reward={toast} />
    </div>
    </GameCtx.Provider>
    </StatusCtx.Provider>
  );
}

/* ================================ LIST VIEW =============================== */
function ListView(props) {
  const { tasks, filter, setFilter, counts, sort, setSort, moveTask, dragId, setDragId,
    toggle, remove, onEdit, onToggleCheck } = props;
  const { order } = useContext(StatusCtx);

  const dueCmp = (a, b) => (a.due || "9999-99-99").localeCompare(b.due || "9999-99-99");

  const filtered = useMemo(() => {
    let l = tasks;
    if (filter === "active") l = l.filter((t) => !t.done);
    if (filter === "done") l = l.filter((t) => t.done);
    return l;
  }, [tasks, filter]);

  const flat = useMemo(() => {
    if (sort === "manual") return filtered;
    const a = [...filtered];
    a.sort((x, y) => {
      if (sort === "status") return (order[x.status] ?? 99) - (order[y.status] ?? 99) || dueCmp(x, y);
      if (x.done !== y.done) return x.done ? 1 : -1;
      if (sort === "rarity") return RARITY_ORDER[x.rarity] - RARITY_ORDER[y.rarity] || dueCmp(x, y);
      if (sort === "due") return dueCmp(x, y) || RARITY_ORDER[x.rarity] - RARITY_ORDER[y.rarity];
      return 0;
    });
    return a;
  }, [filtered, sort]);

  const groups = useMemo(() => {
    const g = { overdue: [], today: [], upcoming: [], nodate: [], done: [] };
    filtered.forEach((t) => {
      if (t.done) { g.done.push(t); return; }
      if (!t.due) { g.nodate.push(t); return; }
      const n = diffDays(t.due, todayStr());
      if (n < 0) g.overdue.push(t);
      else if (n === 0) g.today.push(t);
      else g.upcoming.push(t);
    });
    const byDue = (a, b) => dueCmp(a, b) || RARITY_ORDER[a.rarity] - RARITY_ORDER[b.rarity];
    const byPrio = (a, b) => RARITY_ORDER[a.rarity] - RARITY_ORDER[b.rarity];
    g.overdue.sort(byDue); g.today.sort(byPrio); g.upcoming.sort(byDue);
    g.nodate.sort(byPrio); g.done.sort((a, b) => b.created - a.created);
    return g;
  }, [filtered]);

  const sections = [
    { key: "overdue", title: "En retard", icon: <AlertTriangle size={14} />, tone: "overdue" },
    { key: "today", title: "Aujourd'hui", tone: "today" },
    { key: "upcoming", title: "À venir", tone: "soon" },
    { key: "nodate", title: "Sans échéance", tone: "later" },
    { key: "done", title: "Terminées", tone: "later" },
  ].filter((s) => groups[s.key].length > 0 && (filter !== "active" || s.key !== "done"));

  const rowProps = (t) => ({
    task: t, toggle, remove, onEdit, onToggleCheck,
    dragMode: sort === "manual", dragging: dragId === t.id,
    onDragStart: (e) => { try { e.dataTransfer.setData("text/plain", t.id); e.dataTransfer.effectAllowed = "move"; } catch (_) {} setDragId(t.id); },
    onDragEnter: () => { if (dragId && dragId !== t.id) moveTask(dragId, t.id); },
    onDragEnd: () => setDragId(null),
  });

  const empty = filtered.length === 0;

  return (
    <div className="cad-list">
      <div className="cad-controls">
        <div className="cad-filters">
          {[["active", "À faire", counts.active], ["all", "Toutes", counts.active + counts.done], ["done", "Terminées", counts.done]]
            .map(([k, lbl, c]) => (
              <button key={k} className={filter === k ? "on" : ""} onClick={() => setFilter(k)}>{lbl} <span>{c}</span></button>
            ))}
        </div>
        <SortMenu sort={sort} setSort={setSort} />
      </div>

      {empty ? (
        <div className="cad-empty">
          <Inbox size={32} strokeWidth={1.5} />
          <p>{filter === "done" ? "Aucune tâche terminée pour le moment." : "Tout est fait. Ajoute une tâche pour commencer."}</p>
        </div>
      ) : sort === "smart" ? (
        sections.map((s) => (
          <section key={s.key} className="cad-sect">
            <div className="cad-sect-h" style={{ color: URGENCY[s.tone] }}>{s.icon}{s.title}<span>{groups[s.key].length}</span></div>
            <div>{groups[s.key].map((t) => <TaskRow key={t.id} {...rowProps(t)} />)}</div>
          </section>
        ))
      ) : (
        <div className="cad-flat">
          {sort === "manual" && (
            <div className="cad-drag-hint"><GripVertical size={13} /> Glissez les tâches pour les réorganiser</div>
          )}
          {flat.map((t) => <TaskRow key={t.id} {...rowProps(t)} />)}
        </div>
      )}
    </div>
  );
}

function TaskRow({ task, toggle, remove, onEdit, onToggleCheck, dragMode, dragging, onDragStart, onDragEnter, onDragEnd }) {
  const RARITY = useContext(GameCtx);
  const { map } = useContext(StatusCtx);
  const meta = dateMeta(task.due);
  const p = RARITY[task.rarity] || RARITY.commune;
  const sObj = map[task.status];
  const rowBg = sObj && sObj.bg ? hexA(sObj.bg, 0.16) : undefined;
  const blocks = normalizeDesc(task.desc);
  const textPreview = blocks.filter((b) => b.type === "p").map((b) => stripHtml(b.html)).filter(Boolean).join(" · ");
  const checks = blocks.filter((b) => b.type === "check");
  const done = checks.filter((c) => c.checked).length;
  const CAP = 8;
  const shown = checks.slice(0, CAP);
  const extra = checks.length - shown.length;

  return (
    <div className={`cad-row ${task.done ? "done" : ""} ${dragging ? "dragging" : ""}`}
      style={rowBg ? { background: rowBg } : undefined}
      draggable={dragMode || undefined}
      onDragStart={dragMode ? onDragStart : undefined}
      onDragEnter={dragMode ? onDragEnter : undefined}
      onDragOver={dragMode ? ((e) => e.preventDefault()) : undefined}
      onDragEnd={dragMode ? onDragEnd : undefined}>
      {task.image && (
        <button className="cad-row-banner" onClick={() => onEdit(task)} tabIndex={-1} aria-label="Ouvrir la tâche">

/* ============================== CALENDAR VIEW ============================= */
function CalendarView({ tasks, monthCursor, setMonthCursor, onDay, dragId, setDragId, setDue }) {
  const RARITY = useContext(GameCtx);
  const { map } = useContext(StatusCtx);
  const { y, m } = monthCursor;
  const [overDay, setOverDay] = useState(null);
  const grid = useMemo(() => {
    const first = new Date(y, m, 1);
    const offset = (first.getDay() + 6) % 7;
    const start = new Date(y, m, 1 - offset);
    const cells = [];
    for (let i = 0; i < 42; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      cells.push(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`);
    }
    return cells;
  }, [y, m]);

  const byDay = useMemo(() => {
    const map = {};
    tasks.forEach((t) => { if (t.due) (map[t.due] ||= []).push(t); });
    Object.values(map).forEach((arr) => arr.sort((a, b) => RARITY_ORDER[a.rarity] - RARITY_ORDER[b.rarity]));
    return map;
  }, [tasks]);

  const move = (delta) => {
    let nm = m + delta, ny = y;
    if (nm < 0) { nm = 11; ny--; } if (nm > 11) { nm = 0; ny++; }
    setMonthCursor({ y: ny, m: nm });
  };
  const today = todayStr();

  return (
    <div className="cad-cal">
      <div className="cad-cal-head">
        <h2>{MOIS[m].charAt(0).toUpperCase() + MOIS[m].slice(1)} {y}</h2>
        <div className="cad-cal-nav">
          <button onClick={() => { const d = new Date(); setMonthCursor({ y: d.getFullYear(), m: d.getMonth() }); }}>Aujourd'hui</button>
          <button onClick={() => move(-1)} aria-label="Mois précédent"><ChevronLeft size={18} /></button>
          <button onClick={() => move(1)} aria-label="Mois suivant"><ChevronRight size={18} /></button>
        </div>
      </div>

      <div className="cad-week">{JOURS.map((d) => <div key={d}>{d}</div>)}</div>

      <div className="cad-cal-hint"><GripVertical size={13} /> Glissez une tâche sur un autre jour pour modifier son échéance</div>

      <div className="cad-grid">
        {grid.map((ds) => {
          const inMonth = parseLocal(ds).getMonth() === m;
          const items = byDay[ds] || [];
          const isToday = ds === today;
          const hasOverdue = items.some((t) => !t.done && diffDays(ds, today) < 0);
          const over = dragId && overDay === ds;
          return (
            <button key={ds} className={`cad-day ${inMonth ? "" : "out"} ${isToday ? "today" : ""} ${over ? "over" : ""}`}
              onClick={() => onDay(ds)}
              onDragOver={(e) => { if (dragId) e.preventDefault(); }}
              onDragEnter={() => { if (dragId) setOverDay(ds); }}
              onDrop={(e) => { e.preventDefault(); if (dragId) setDue(dragId, ds); setDragId(null); setOverDay(null); }}>
              <span className="cad-daynum">{parseLocal(ds).getDate()}</span>
              <div className="cad-chips">
                {items.slice(0, 3).map((t) => {
                  const sb = map[t.status];
                  const chipBg = t.done ? null : (sb && sb.bg ? hexA(sb.bg, 0.30) : (RARITY[t.rarity] || RARITY.commune).soft);
                  return (
                    <span key={t.id} className={`cad-chip ${t.done ? "cdone" : ""}`} draggable
                      title="Glisser pour changer la date"
                      onDragStart={(e) => { e.stopPropagation(); try { e.dataTransfer.setData("text/plain", t.id); e.dataTransfer.effectAllowed = "move"; } catch (_) {} setDragId(t.id); }}
                      onDragEnd={() => { setDragId(null); setOverDay(null); }}
                      style={{ borderLeftColor: (RARITY[t.rarity] || RARITY.commune).color, ...(chipBg ? { background: chipBg } : {}) }}>
                      {t.icon ? t.icon + " " : ""}{t.title}
                    </span>
                  );
                })}
                {items.length > 3 && <span className="cad-more">+{items.length - 3}</span>}
              </div>
              {hasOverdue && <span className="cad-dot" />}
            </button>
          );
        })}
      </div>

      <div className="cad-legend">
        {Object.entries(RARITY).map(([k, v]) => (<span key={k}><i style={{ background: v.color }} />{v.label}</span>))}
        <span className="cad-legend-od"><i style={{ background: "#E8836B" }} />Échéance dépassée</span>
      </div>
    </div>
  );
}

/* ========================== DESCRIPTION EDITOR ========================== */
const DescEditor = forwardRef(function DescEditor({ initial }, ref) {
  const [blocks, setBlocks] = useState(() => {
    const v = normalizeDesc(initial);
    return v.length ? v : [{ id: uid(), type: "p", checked: false, html: "" }];
  });
  const els = useRef({});
  const inited = useRef(new Set());

  useLayoutEffect(() => {
    blocks.forEach((b) => {
      const el = els.current[b.id];
      if (el && !inited.current.has(b.id)) { el.innerHTML = b.html || ""; inited.current.add(b.id); }
    });
  });

  const collect = () => blocks.map((b) => ({
    id: b.id, type: b.type, checked: !!b.checked,
    html: els.current[b.id] ? els.current[b.id].innerHTML : (b.html || ""),
  }));
  useImperativeHandle(ref, () => ({ getValue: collect }));

  const setEl = (id) => (el) => { if (el) els.current[id] = el; else delete els.current[id]; };
  const mutate = (fn) => setBlocks((prev) => {
    const snap = prev.map((b) => ({ ...b, html: els.current[b.id] ? els.current[b.id].innerHTML : (b.html || "") }));
    return fn(snap);
  });
  const focusEnd = (id) => requestAnimationFrame(() => {
    const el = els.current[id];
    if (!el) return;
    el.focus();
    const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
  });
  const fmt = (cmd) => { try { document.execCommand(cmd, false); } catch (e) {} };
  const addBlock = (type) => { const id = uid(); mutate((b) => [...b, { id, type, checked: false, html: "" }]); focusEnd(id); };
  const toggle = (id) => mutate((b) => b.map((x) => x.id === id ? { ...x, checked: !x.checked } : x));
  const removeBlock = (id) => mutate((b) => (b.length > 1 ? b.filter((x) => x.id !== id) : [{ ...b[0], type: "p" }]));

  const onKeyDown = (e, b, idx) => {
    if (b.type !== "check") return;
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      const id = uid();
      mutate((arr) => {
        const i = arr.findIndex((x) => x.id === b.id);
        const copy = [...arr]; copy.splice(i + 1, 0, { id, type: "check", checked: false, html: "" }); return copy;
      });
      focusEnd(id);
    } else if (e.key === "Backspace") {
      const el = els.current[b.id];
      if (el && el.innerHTML === "") {
        e.preventDefault();
        const prev = blocks[idx - 1];
        mutate((arr) => (arr.length > 1 ? arr.filter((x) => x.id !== b.id) : arr));
        if (prev) focusEnd(prev.id);
      }
    }
  };

  return (
    <div className="cad-ed">
      <div className="cad-ed-bar">
        <button type="button" className="cad-ed-b" title="Gras" onMouseDown={(e) => { e.preventDefault(); fmt("bold"); }}><b>B</b></button>
        <button type="button" className="cad-ed-b" title="Italique" onMouseDown={(e) => { e.preventDefault(); fmt("italic"); }}><i>I</i></button>
        <span className="cad-ed-sep" />
        <button type="button" onMouseDown={(e) => e.preventDefault()} onClick={() => addBlock("check")}><CheckSquare size={15} /> Case à cocher</button>
        <button type="button" onMouseDown={(e) => e.preventDefault()} onClick={() => addBlock("p")} title="Ligne de texte">¶ Texte</button>
      </div>
      <div className="cad-ed-body">
        {blocks.map((b, idx) =>
          b.type === "check" ? (
            <div className="cad-cl" key={b.id}>
              <button type="button" className="cad-cl-box" data-on={b.checked} onClick={() => toggle(b.id)} aria-label={b.checked ? "Décocher" : "Cocher"}>
                {b.checked && <Check size={12} strokeWidth={3} color="#10201B" />}
              </button>
              <div ref={setEl(b.id)} className={`cad-cl-text ${b.checked ? "done" : ""}`} contentEditable suppressContentEditableWarning
                data-ph="Élément de liste…" onKeyDown={(e) => onKeyDown(e, b, idx)} />
              <button type="button" className="cad-cl-del" tabIndex={-1} onClick={() => removeBlock(b.id)} aria-label="Retirer la ligne"><X size={13} /></button>
            </div>
          ) : (
            <div ref={setEl(b.id)} key={b.id} className="cad-p-text" contentEditable suppressContentEditableWarning
              data-ph="Ajouter des détails…" onKeyDown={(e) => onKeyDown(e, b, idx)} />
          )
        )}
      </div>
    </div>
  );
});

            onChange={(e) => { const f = e.target.files && e.target.files[0]; e.target.value = ""; if (f) onImport(f); }} />
        </div>

        {confirmReset ? (
          <div className="cad-reset-confirm">
            <span>Tout effacer (tâches et catégories) ? Cette action est irréversible.</span>
            <div>
              <button className="cad-ghost" onClick={() => setConfirmReset(false)}>Annuler</button>
              <button className="cad-del-btn" onClick={() => { onReset(); setConfirmReset(false); }}>Réinitialiser</button>
            </div>
          </div>
        ) : (
          <button className="cad-reset-link" onClick={() => setConfirmReset(true)}><Trash2 size={14} /> Réinitialiser l'application</button>
        )}

        <div className="cad-modal-f">
          <div className="cad-modal-f-r">
            <button className="cad-primary" onClick={onClose}>Terminé</button>
          </div>
        </div>
      </div>
    </Overlay>
  );
}

/* =============================== TASK MODAL ============================== */
function TaskModal({ initial, isNew, onClose, onSave, onDelete }) {
  const RARITY = useContext(GameCtx);
  const { list: statusList } = useContext(StatusCtx);
  const [title, setTitle] = useState(initial.title || "");
  const [due, setDue] = useState(initial.due || "");
  const [rarity, setRarity] = useState(initial.rarity || "commune");
  const [status, setStatus] = useState(initial.status || (initial.done ? "done" : "todo"));
  const [icon, setIcon] = useState(initial.icon || null);
  const [iconPick, setIconPick] = useState(false);
  const [image, setImage] = useState(initial.image || null);
  const [imgBusy, setImgBusy] = useState(false);
  const titleRef = useRef(null);
  const descRef = useRef(null);
  const fileRef = useRef(null);
  useEffect(() => { titleRef.current?.focus(); }, []);

  const onFile = async (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setImgBusy(true);
    try { setImage(await fileToBanner(f)); } catch (err) { /* ignore */ }
    setImgBusy(false);
  };

  const save = () => {
    if (!title.trim()) return;
    onSave({
      id: initial.id || uid(),
      title: title.trim(),
      desc: descRef.current ? descRef.current.getValue() : normalizeDesc(initial.desc),
      image: image || null,
      icon: icon || null,
      due: due || null, rarity,
      status, done: status === "done",
      created: initial.created || Date.now(),
    });
  };

  return (
    <Overlay onClose={onClose}>
      <div className="cad-modal" onClick={(e) => e.stopPropagation()}>
        <div className="cad-modal-h">
          <h3>{isNew ? "Nouvelle tâche" : "Modifier la tâche"}</h3>
          <button onClick={onClose} aria-label="Fermer"><X size={18} /></button>
        </div>

        <label className="cad-lbl">Titre</label>
        <div className="cad-title-row">
          <div className="cad-icon-field">
            <button type="button" className="cad-icon-btn" onClick={() => setIconPick((p) => !p)} title="Choisir une icône">
              {icon ? <span className="cad-icon-cur">{icon}</span> : <Smile size={18} />}
            </button>
            {iconPick && <EmojiPicker value={icon} onPick={(e) => { setIcon(e); setIconPick(false); }} onClose={() => setIconPick(false)} />}
          </div>
          <input ref={titleRef} className="cad-in" value={title} onChange={(e) => setTitle(e.target.value)}
            placeholder="Que faut-il faire ?" onKeyDown={(e) => e.key === "Enter" && save()} />
        </div>

        <label className="cad-lbl">Statut</label>
        <div className="cad-status-pick">
          {statusList.map((s) => (
            <button key={s.id} className={status === s.id ? "on" : ""} onClick={() => setStatus(s.id)}
              style={status === s.id ? { background: hexA(s.color, 0.16), color: s.color, borderColor: s.color } : {}}>
              {s.icon ? <span className="cad-sicon">{s.icon}</span> : <span className="cad-sdot" style={{ background: s.color }} />} {s.label}
            </button>
          ))}
        </div>

        <label className="cad-lbl">Image (bannière)</label>
        {imgBusy ? (
          <div className="cad-img-busy"><Loader2 size={16} className="cad-spin" /> Traitement de l'image…</div>
        ) : image ? (
          <div className="cad-img-wrap">
            <img src={image} alt="Bannière de la tâche" />
            <div className="cad-img-acts">
              <button onClick={() => fileRef.current?.click()}>Remplacer</button>
              <button onClick={() => setImage(null)}>Retirer</button>
            </div>
          </div>
        ) : (
          <button className="cad-img-add" onClick={() => fileRef.current?.click()}><ImagePlus size={17} /> Ajouter une image</button>
        )}
        <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{ display: "none" }} />

        <label className="cad-lbl">Description</label>
        <DescEditor ref={descRef} initial={initial.desc} />

        <div className="cad-modal-row">
          <div style={{ flex: 1 }}>
            <label className="cad-lbl">Échéance</label>
            <input className="cad-in" type="date" value={due} onChange={(e) => setDue(e.target.value)} />
          </div>
          <div style={{ flex: 1 }}>
            <label className="cad-lbl">Rareté</label>
            <div className="cad-prio-pick">
              {Object.entries(RARITY).map(([k, v]) => (
                <button key={k} className={rarity === k ? "on" : ""} onClick={() => setRarity(k)}
                  style={rarity === k ? { background: v.soft, color: v.color, borderColor: v.color } : {}}>
                  <Gem size={12} /> {v.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="cad-modal-f">
          {!isNew && <button className="cad-del" onClick={() => onDelete(initial.id)}><Trash2 size={15} /> Supprimer</button>}
          <div className="cad-modal-f-r">
            <button className="cad-ghost" onClick={onClose}>Annuler</button>
            <button className="cad-primary" onClick={save} disabled={!title.trim()}>{isNew ? "Ajouter" : "Enregistrer"}</button>
          </div>
        </div>
      </div>
    </Overlay>
  );
}

/* =============================== DAY MODAL =============================== */
function DayModal({ date, tasks, onClose, toggle, onEdit, onAdd }) {
  const RARITY = useContext(GameCtx);
  const { map } = useContext(StatusCtx);
  const meta = dateMeta(date);
  return (
    <Overlay onClose={onClose}>
      <div className="cad-modal" onClick={(e) => e.stopPropagation()}>
        <div className="cad-modal-h">
          <div>
            <h3>{longDate(date)}</h3>
            {meta && <p className="cad-day-meta" style={{ color: URGENCY[meta.level] }}>
              {meta.prefix ? `${meta.prefix} · ${meta.label}` : meta.label}
            </p>}
          </div>
          <button onClick={onClose} aria-label="Fermer"><X size={18} /></button>
        </div>

        {tasks.length === 0 ? (
          <p className="cad-day-empty">Aucune tâche ce jour-là.</p>
        ) : (
          <div className="cad-day-list">
            {tasks.map((t) => {
              const p = RARITY[t.rarity] || RARITY.commune;
              const st = descStats(t.desc);
              const sb = map[t.status];
              const itemBg = sb && sb.bg ? hexA(sb.bg, 0.14) : undefined;
              return (
                <div key={t.id} className={`cad-day-item ${t.done ? "done" : ""}`} style={itemBg ? { background: itemBg } : undefined}>
                  <DoneCheck done={t.done} onToggle={() => toggle(t.id)} />
                  <button className="cad-day-title" onClick={() => onEdit(t)}>
                    <span>{t.icon && <span className="cad-ticon">{t.icon}</span>}{t.title}</span>
                    <span className="cad-day-tags">
                      <StatusPill status={t.status} />
                      {st.total > 0 && <span className="cad-cl-badge"><ListChecks size={11} /> {st.done}/{st.total}</span>}
                      <span className="cad-prio" style={{ background: p.soft, color: p.color }}><Gem size={10} /> {p.label}</span>
                    </span>
                  </button>
                </div>
              );
            })}
          </div>
        )}

        <button className="cad-primary cad-fullbtn" onClick={onAdd}><Plus size={16} /> Ajouter une tâche ce jour</button>
      </div>
    </Overlay>
  );
}

function Overlay({ children, onClose }) {
  return <div className="cad-overlay" onClick={onClose}>{children}</div>;
}
